name: ci

on:
  push:
  pull_request:

jobs:
  protected-manifest-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce approval on protected manifest edits
        uses: actions/github-script@v7
        with:
          script: |
            const protectedFiles = new Set([
              'data/manifests/train.txt',
              'data/manifests/val.txt',
              'data/manifests/all.txt',
            ]);
            const approvalLabel = 'manifest-change-approved';
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const touched = files
              .filter((f) => protectedFiles.has(f.filename) || (f.previous_filename && protectedFiles.has(f.previous_filename)))
              .map((f) => f.filename);

            if (touched.length === 0) {
              core.info('No protected manifest files changed.');
              return;
            }

            const labels = (pr.labels || []).map((l) => l.name);
            if (!labels.includes(approvalLabel)) {
              core.setFailed(
                `This PR modifies protected manifest file(s): ${touched.join(', ')}. ` +
                `A maintainer must explicitly approve this by adding the '${approvalLabel}' label.`
              );
              return;
            }

            core.info(`Protected manifest change approved via '${approvalLabel}' label.`);

  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy nanofold scripts train.py eval.py
      - name: Pyright
        run: pyright --warnings
      - name: Official Hash Sync Check
        run: python scripts/sync_official_manifest_hashes.py --check
      - name: Public Release Leak Check
        run: python scripts/check_public_release_leaks.py
      - name: Pytest
        run: pytest
      - name: JSON Schema Checks
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          lb_path = Path("leaderboard/leaderboard.json")
          if lb_path.exists():
              entries = json.loads(lb_path.read_text())
              if not isinstance(entries, list):
                  raise SystemExit("leaderboard/leaderboard.json must be a JSON list")
              for idx, row in enumerate(entries):
                  if not isinstance(row, dict):
                      raise SystemExit(f"leaderboard row {idx} must be an object")
                  required_any = ("rank_score", "foldscore_auc_hidden", "final_hidden_foldscore")
                  if not any(key in row for key in required_any):
                      raise SystemExit(f"leaderboard row {idx} missing any score field: {required_any}")
          for result in Path("runs").glob("*/result.json"):
              obj = json.loads(result.read_text())
              if not isinstance(obj, dict):
                  raise SystemExit(f"{result} must be an object")
              if "schema_version" not in obj:
                  raise SystemExit(f"{result} missing schema_version")
              if "track" not in obj:
                  raise SystemExit(f"{result} missing track")
          PY
  smoke-official:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Build synthetic smoke dataset and config
        run: |
          mkdir -p .ci_smoke/processed_features .ci_smoke/processed_labels .ci_smoke/manifests
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import numpy as np
          import yaml

          from nanofold.chain_paths import chain_npz_path

          cid = "1abc_A"
          Path(".ci_smoke/manifests/train.txt").write_text(f"{cid}\n")
          Path(".ci_smoke/manifests/val.txt").write_text(f"{cid}\n")

          L, N, T = 128, 8, 1
          np.savez_compressed(
              chain_npz_path(".ci_smoke/processed_features", cid),
              aatype=np.zeros((L,), dtype=np.int32),
              msa=np.zeros((N, L), dtype=np.int32),
              deletions=np.zeros((N, L), dtype=np.int32),
              residue_index=np.arange(L, dtype=np.int32),
              between_segment_residues=np.zeros((L,), dtype=np.int32),
              template_aatype=np.zeros((T, L), dtype=np.int32),
              template_ca_coords=np.zeros((T, L, 3), dtype=np.float32),
              template_ca_mask=np.ones((T, L), dtype=bool),
          )
          np.savez_compressed(
              chain_npz_path(".ci_smoke/processed_labels", cid),
              ca_coords=np.zeros((L, 3), dtype=np.float32),
              ca_mask=np.ones((L,), dtype=bool),
              atom14_positions=np.zeros((L, 14, 3), dtype=np.float32),
              atom14_mask=np.ones((L, 14), dtype=bool),
              residue_index=np.arange(L, dtype=np.int32),
              resolution=np.asarray(2.0, dtype=np.float32),
          )

          cfg = {
              "run_name": "ci_smoke_official",
              "track": "smoke",
              "seed": 0,
              "submission": {"module": "nanofold.baseline_submission"},
              "data": {
                  "processed_features_dir": ".ci_smoke/processed_features",
                  "processed_labels_dir": ".ci_smoke/processed_labels",
                  "train_manifest": ".ci_smoke/manifests/train.txt",
                  "val_manifest": ".ci_smoke/manifests/val.txt",
                  "crop_size": 128,
                  "msa_depth": 64,
                  "batch_size": 1,
                  "num_workers": 0,
                  "train_crop_mode": "random",
                  "val_crop_mode": "center",
                  "train_msa_sample_mode": "random",
                  "val_msa_sample_mode": "top",
              },
              "model": {"d_model": 64, "n_layers": 2, "n_heads": 4, "dropout": 0.0, "max_seq_len": 256},
              "optim": {
                  "lr": 2.5e-4,
                  "weight_decay": 1.0e-3,
                  "grad_clip_norm": 1.0,
                  "scheduler": "none",
              },
              "loss": {
                  "local_weight": 1.0,
                  "global_weight": 0.25,
                  "bond_weight": 0.10,
                  "local_cutoff": 15.0,
                  "global_max_dist": 32.0,
              },
              "train": {
                  "max_steps": 20,
                  "log_every": 5,
                  "eval_every": 10,
                  "save_every": 10,
                  "grad_accum_steps": 2,
                  "amp": False,
              },
          }
          Path(".ci_smoke/config.yaml").write_text(yaml.safe_dump(cfg, sort_keys=False))
          smoke_track = {
              "id": "smoke",
              "name": "Smoke Test",
              "mode": "smoke",
              "official": False,
              "dataset": {
                  "train_manifest": ".ci_smoke/manifests/train.txt",
                  "val_manifest": ".ci_smoke/manifests/val.txt",
                  "hidden_manifest": None,
                  "fingerprint": None,
                  "hidden_fingerprint": None,
                  "hidden_manifest_sha256": None,
                  "hidden_fingerprint_sha256": None,
                  "hidden_lock_file": None,
                  "train_chain_count": 1,
                  "val_chain_count": 1,
                  "hidden_chain_count": None,
              },
              "scoring": {
                  "rank_metric": "foldscore_auc_hidden",
                  "rank_tiebreak_metric": "final_hidden_foldscore",
                  "foldscore_weights": {
                      "lddt_ca": 0.55,
                      "lddt_backbone_atom14": 0.30,
                      "lddt_atom14": 0.15,
                  },
              },
              "templates": {
                  "enabled": False,
                  "policy": "disabled_to_avoid_template_and_release_date_leakage",
              },
              "train": {
                  "seed": 0,
                  "crop_size": 128,
                  "msa_depth": 64,
                  "effective_batch_size": 2,
                  "max_steps": 20,
                  "val_crop_mode": "center",
                  "val_msa_sample_mode": "top",
              },
              "model": {"max_params": None},
          }
          Path("tracks/smoke.yaml").write_text(yaml.safe_dump(smoke_track, sort_keys=False))
          PY
      - name: Build smoke fingerprint
        run: |
          python scripts/build_fingerprint.py \
            --config .ci_smoke/config.yaml \
            --output .ci_smoke/fingerprint.json \
            --track smoke
      - name: Validate submission smoke contract
        run: |
          python scripts/validate_submission.py --submission submissions/template --track limited
      - name: Train smoke official run
        run: |
          python train.py \
            --config .ci_smoke/config.yaml \
            --track smoke \
            --official \
            --fingerprint .ci_smoke/fingerprint.json \
            --deterministic
      - name: Predict smoke multi-checkpoint
        run: |
          mkdir -p .ci_smoke/forbid_labels
          python predict.py \
            --config .ci_smoke/config.yaml \
            --track smoke \
            --official \
            --fingerprint .ci_smoke/fingerprint.json \
            --split val \
            --forbid-labels-dir .ci_smoke/forbid_labels \
            --ckpt-dir runs/ci_smoke_official/checkpoints \
            --ckpt-steps 0,10,20 \
            --pred-out-dir .ci_smoke/preds \
            --save .ci_smoke/predict_multi.json
      - name: Score smoke multi-checkpoint
        run: |
          python score.py \
            --prediction-summary .ci_smoke/predict_multi.json \
            --labels-dir .ci_smoke/processed_labels \
            --per-chain-out .ci_smoke/per_chain.jsonl \
            --save .ci_smoke/eval_multi.json
      - name: Smoke artifact schema checks
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          obj = json.loads(Path(".ci_smoke/eval_multi.json").read_text())
          if not isinstance(obj, dict):
              raise SystemExit("eval summary must be object")
          if "checkpoints" not in obj or not isinstance(obj["checkpoints"], list):
              raise SystemExit("eval summary missing checkpoints list")
          if len(obj["checkpoints"]) < 2:
              raise SystemExit("expected multi-checkpoint eval output")
          if "mean_lddt_ca" not in obj:
              raise SystemExit("eval summary missing mean_lddt_ca")
          if "sample_budget" not in obj:
              raise SystemExit("eval summary missing sample_budget")
          if not any(int(item.get("step", -1)) == 0 for item in obj["checkpoints"]):
              raise SystemExit("expected step-0 checkpoint metadata")
          PY
