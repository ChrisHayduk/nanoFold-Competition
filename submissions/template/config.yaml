# Copy this file to submissions/<your_name>/config.yaml and modify.
#
# Competition constraints:
# - Use only data produced by scripts/prepare_data.py + scripts/preprocess.py.
# - Do not change train_manifest / val_manifest.
# - Submission models must output C-alpha coordinates with shape (L, 3).
#
# Submission API:
# - `submission.path` should point to a Python file that defines:
#   - `build_model(cfg)`
#   - `build_optimizer(cfg, model)`
#   - `run_batch(model, batch, cfg, training)` -> {"pred_ca": ..., "loss": ...}
#
# Fixed-budget note:
# - In this baseline, effective_batch_size == data.batch_size (no grad accumulation).

run_name: your_name_run1
seed: 0

submission:
  path: submission.py

data:
  processed_dir: data/processed
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 128
  batch_size: 1
  num_workers: 2

model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1

optim:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0

train:
  max_steps: 7000
  log_every: 50
  eval_every: 500
  save_every: 500
  amp: true
