# Copy this file to submissions/<your_name>/config.yaml and modify.
#
# Competition constraints:
# - Use only data produced by scripts/prepare_data.py + scripts/preprocess.py.
# - Do not change train_manifest / val_manifest.
# - Submission models must output C-alpha coordinates with shape (L, 3).
#
# Submission API:
# - `submission.path` should point to a Python file that defines:
#   - `build_model(cfg)`
#   - `build_optimizer(cfg, model)`
#   - `run_batch(model, batch, cfg, training)`:
#       - always returns `pred_ca`
#       - returns `loss` when `training=True`
#       - must not depend on `ca_coords` / `ca_mask` when `training=False`
#
# Fixed-budget note:
# - Official `limited_large_v3` requires:
#   seed=0, crop_size=256, msa_depth=192, effective_batch_size=2, max_steps=10000.

run_name: your_name_run1
track: limited_large_v3
seed: 0

submission:
  path: submission.py

data:
  processed_features_dir: data/processed_features
  processed_labels_dir: data/processed_labels
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 192
  batch_size: 1
  num_workers: 2
  train_crop_mode: random
  val_crop_mode: center
  train_msa_sample_mode: random
  val_msa_sample_mode: top

model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1

optim:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0

train:
  max_steps: 10000
  log_every: 50
  eval_every: 500
  save_every: 500
  grad_accum_steps: 2
  amp: true
