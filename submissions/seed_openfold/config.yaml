run_name: seed_openfold_v1
seed: 0

submission:
  path: submission.py

data:
  processed_dir: data/processed
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 128
  batch_size: 1
  num_workers: 2

model:
  c_m: 128
  c_z: 64
  c_s: 128
  n_evoformer_blocks: 4
  n_structure_blocks: 4
  n_heads_msa: 8
  n_heads_pair: 4
  n_heads_structure: 8
  relpos_bins: 32
  template_dist_bins: 39
  template_dist_min: 3.0
  template_dist_max: 50.0
  distogram_bins: 64
  plddt_bins: 50
  dropout: 0.1

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0

loss:
  coord_weight: 1.0
  distogram_weight: 0.3
  plddt_weight: 0.1
  coord_cutoff: 15.0
  distogram_min_bin: 2.0
  distogram_max_bin: 22.0

train:
  max_steps: 7000
  log_every: 50
  eval_every: 500
  save_every: 500
  amp: true
