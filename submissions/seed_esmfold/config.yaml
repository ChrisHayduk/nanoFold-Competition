run_name: seed_esmfold_v1
seed: 0

submission:
  path: submission.py

data:
  processed_dir: data/processed
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 128
  batch_size: 1
  num_workers: 2

model:
  d_model: 256
  n_layers: 8
  n_heads: 8
  pair_dim: 128
  relpos_bins: 32
  distogram_bins: 64
  plddt_bins: 50
  max_seq_len: 1024
  dropout: 0.1

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0

loss:
  coord_weight: 1.0
  distogram_weight: 0.3
  plddt_weight: 0.1
  coord_cutoff: 15.0
  distogram_min_bin: 2.0
  distogram_max_bin: 22.0

train:
  max_steps: 7000
  log_every: 50
  eval_every: 500
  save_every: 500
  amp: true
