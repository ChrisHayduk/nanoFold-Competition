# Canonical maintainer profile for the official limited track (Large).
# This keeps the baseline model/optimizer choices, but enforces official
# data-budget constants and validation protocol settings.

run_name: official_limited_large_baseline
track: limited_large
seed: 0

submission:
  module: nanofold.baseline_submission

data:
  processed_features_dir: data/processed_features
  processed_labels_dir: data/processed_labels
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 192
  batch_size: 1
  num_workers: 2
  train_crop_mode: random
  val_crop_mode: center
  train_msa_sample_mode: random
  val_msa_sample_mode: top

model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1
  max_seq_len: 1024

optim:
  lr: 2.5e-4
  weight_decay: 1.0e-3
  grad_clip_norm: 1.0
  scheduler: warmup_cosine
  warmup_steps: 500
  min_lr: 2.5e-5

loss:
  local_weight: 1.0
  global_weight: 0.25
  bond_weight: 0.10
  local_cutoff: 15.0
  global_max_dist: 32.0

train:
  max_steps: 10000
  log_every: 50
  eval_every: 500
  save_every: 500
  grad_accum_steps: 2
  amp: true
