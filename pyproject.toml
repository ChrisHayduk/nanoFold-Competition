[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "data",
  "runs",
  "third_party",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]
ignore = [
  "E501",   # keep long command/doc strings readable
  "E402",   # scripts adjust sys.path before importing repo modules
  "B009",   # tests and runtime intentionally use dynamic module attributes
  "UP015",  # avoid readability churn in old utility scripts
  "UP017",
  "UP037",
  "UP045",
  "UP006",  # allow typing.Dict/List in older modules until a focused modernization pass
  "UP035",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
strict_optional = true
exclude = "(^data/|^runs/|^third_party/)"
